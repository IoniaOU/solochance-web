<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <style>
        body { background: transparent; font-family: 'Ubuntu', sans-serif; font-size: 14px; overflow: hidden; }
        .widget-container { border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #fff; }
        .chance-val { font-weight: bold; color: #28a745; }
        .header { font-size: 0.9rem; margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>
<div class="widget-container">
    <div class="header">
        This product works at <span id="display-hash">...</span> per second, current solo block hit chances:
    </div>
    <table class="table table-sm mb-0">
        <tbody id="results-body">
        <tr><td>Per Day</td><td class="text-right chance-val" id="day">...</td></tr>
        <tr><td>Per Week</td><td class="text-right chance-val" id="week">...</td></tr>
        <tr><td>Per Month</td><td class="text-right chance-val" id="month">...</td></tr>
        <tr><td>Per Year</td><td class="text-right chance-val" id="year">...</td></tr>
        </tbody>
    </table>
    <div class="text-center mt-2">
        <small><a href="https://solochance.org" target="_blank">Powered by SoloChance.org</a></small>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const currency = params.get('currency') || 'BTC';
    const hashrate = params.get('hashrate') || '100';
    const unit = params.get('unit') || 'TH';

    document.getElementById('display-hash').innerText = `${hashrate} ${unit}`;

    fetch(`https://api.solochance.org/getSoloChanceCalculations?currency=${currency}&hashrate=${hashrate}&hashrateUnit=${unit}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('day').innerText = data.dayChanceText;
            document.getElementById('week').innerText = data.weekChanceText;
            document.getElementById('month').innerText = data.monthChanceText;
            document.getElementById('year').innerText = data.yearChanceText;
        });
</script>
</body>
</html>
